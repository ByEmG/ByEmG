<svg width="1000" height="470" viewBox="0 0 1000 470" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1000" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="0.55" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#4ADE80"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="48" y1="150" x2="620" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A5B4FC"/>
      <stop offset="0.5" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#151B2E" stroke-width="1"/>
    </pattern>
    <clipPath id="frame"><rect width="1000" height="470" rx="14"/></clipPath>
  </defs>

  <!-- window -->
  <g clip-path="url(#frame)">
    <rect width="1000" height="470" rx="14" fill="#0B0F1A"/>
    <rect width="1000" height="470" fill="url(#grid)" opacity="0.5"/>
    <!-- ambient glow -->
    <circle cx="880" cy="60" r="220" fill="#6366F1" opacity="0.07"/>
    <circle cx="120" cy="440" r="200" fill="#22D3EE" opacity="0.06"/>
    <!-- title bar -->
    <rect width="1000" height="46" fill="#0E1424"/>
    <circle cx="26" cy="23" r="6.5" fill="#FF5F57"/>
    <circle cx="48" cy="23" r="6.5" fill="#FEBC2E"/>
    <circle cx="70" cy="23" r="6.5" fill="#28C840"/>
    <text x="500" y="28" text-anchor="middle" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="13" fill="#64748B">pierre@afryx: ~/build</text>
  </g>
  <rect x="0.75" y="0.75" width="998.5" height="468.5" rx="13.5" stroke="url(#grad)" stroke-opacity="0.55" stroke-width="1.5"/>

  <!-- $ whoami -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.3s" fill="freeze"/>
    <text x="48" y="96" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="17">
      <tspan fill="#4ADE80">$</tspan><tspan fill="#E2E8F0" dx="10">whoami</tspan>
    </text>
  </g>

  <!-- name reveal -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.5s" fill="freeze"/>
    <text x="46" y="158" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="46" font-weight="700" fill="url(#nameGrad)" letter-spacing="-1">Pierre Emmanuel</text>
    <text x="48" y="192" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="16" fill="#94A3B8">Founder &amp; CTO @ Afryx — engineering AI agent systems end-to-end</text>
  </g>

  <!-- pierre now -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.3s" fill="freeze"/>
    <text x="48" y="248" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="17">
      <tspan fill="#4ADE80">$</tspan><tspan fill="#E2E8F0" dx="10">pierre --now</tspan>
    </text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.35s" fill="freeze"/>
    <text x="48" y="288" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="15">
      <tspan fill="#22D3EE">building</tspan><tspan fill="#334155" dx="14">›</tspan><tspan fill="#CBD5E1" dx="14">Kampus · Arcflow · Miyora AI</tspan>
    </text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.75s" dur="0.35s" fill="freeze"/>
    <text x="48" y="320" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="15">
      <tspan fill="#22D3EE">focus</tspan><tspan fill="#334155" dx="47">›</tspan><tspan fill="#CBD5E1" dx="14">LangGraph agents · Claude API · full-stack product</tspan>
    </text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.1s" dur="0.35s" fill="freeze"/>
    <text x="48" y="352" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="15">
      <tspan fill="#22D3EE">base</tspan><tspan fill="#334155" dx="58">›</tspan><tspan fill="#CBD5E1" dx="14">Leeds, UK — building for Africa</tspan>
    </text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.45s" dur="0.35s" fill="freeze"/>
    <text x="48" y="384" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="15">
      <tspan fill="#22D3EE">status</tspan><tspan fill="#334155" dx="36">›</tspan><tspan fill="#4ADE80" dx="14">● shipping</tspan><tspan fill="#64748B" dx="10">— pilot schools onboarding, agents in production</tspan>
    </text>
  </g>

  <!-- prompt + blinking cursor -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.9s" dur="0.3s" fill="freeze"/>
    <text x="48" y="434" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="17" fill="#4ADE80">$</text>
    <rect x="72" y="418" width="11" height="21" fill="#22D3EE">
      <animate attributeName="opacity" values="1;1;0;0;1" dur="1.1s" begin="4.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
