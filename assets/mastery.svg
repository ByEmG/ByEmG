<svg width="1000" height="430" viewBox="0 0 1000 430" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bar" x1="300" y1="0" x2="880" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="0.6" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#4ADE80"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1000" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="430" rx="14" fill="#0B0F1A"/>
  <rect x="0.75" y="0.75" width="998.5" height="428.5" rx="13.5" stroke="url(#edge)" stroke-opacity="0.45" stroke-width="1.5"/>

  <!-- header -->
  <text x="48" y="52" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="16">
    <tspan fill="#4ADE80">$</tspan><tspan fill="#E2E8F0" dx="10">languages --mastery</tspan>
  </text>
  <text x="952" y="52" text-anchor="end" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="12" fill="#475569">compiled from production repos</text>
  <line x1="48" y1="72" x2="952" y2="72" stroke="#1E293B" stroke-width="1"/>

  <!-- TypeScript -->
  <g>
    <text x="48" y="116" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="16" font-weight="700" fill="#E2E8F0">TypeScript</text>
    <text x="48" y="134" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="11" fill="#64748B">daily driver — every product</text>
    <rect x="300" y="106" width="580" height="10" rx="5" fill="#151B2E"/>
    <rect x="300" y="106" height="10" rx="5" fill="url(#bar)" width="0">
      <animate attributeName="width" from="0" to="551" begin="0.3s" dur="1.1s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
    </rect>
    <text x="952" y="116" text-anchor="end" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="14" font-weight="700" fill="#22D3EE">95%</text>
  </g>

  <!-- Python -->
  <g>
    <text x="48" y="172" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="16" font-weight="700" fill="#E2E8F0">Python</text>
    <text x="48" y="190" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="11" fill="#64748B">agents · ML · automation</text>
    <rect x="300" y="162" width="580" height="10" rx="5" fill="#151B2E"/>
    <rect x="300" y="162" height="10" rx="5" fill="url(#bar)" width="0">
      <animate attributeName="width" from="0" to="522" begin="0.45s" dur="1.1s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
    </rect>
    <text x="952" y="172" text-anchor="end" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="14" font-weight="700" fill="#22D3EE">90%</text>
  </g>

  <!-- JavaScript -->
  <g>
    <text x="48" y="228" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="16" font-weight="700" fill="#E2E8F0">JavaScript</text>
    <text x="48" y="246" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="11" fill="#64748B">node · browser · everywhere</text>
    <rect x="300" y="218" width="580" height="10" rx="5" fill="#151B2E"/>
    <rect x="300" y="218" height="10" rx="5" fill="url(#bar)" width="0">
      <animate attributeName="width" from="0" to="534" begin="0.6s" dur="1.1s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
    </rect>
    <text x="952" y="228" text-anchor="end" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="14" font-weight="700" fill="#22D3EE">92%</text>
  </g>

  <!-- SQL -->
  <g>
    <text x="48" y="284" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="16" font-weight="700" fill="#E2E8F0">SQL</text>
    <text x="48" y="302" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="11" fill="#64748B">Postgres · Supabase · RLS design</text>
    <rect x="300" y="274" width="580" height="10" rx="5" fill="#151B2E"/>
    <rect x="300" y="274" height="10" rx="5" fill="url(#bar)" width="0">
      <animate attributeName="width" from="0" to="493" begin="0.75s" dur="1.1s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
    </rect>
    <text x="952" y="284" text-anchor="end" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="14" font-weight="700" fill="#22D3EE">85%</text>
  </g>

  <!-- Bash -->
  <g>
    <text x="48" y="340" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="16" font-weight="700" fill="#E2E8F0">Bash</text>
    <text x="48" y="358" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="11" fill="#64748B">CI · tooling · server ops</text>
    <rect x="300" y="330" width="580" height="10" rx="5" fill="#151B2E"/>
    <rect x="300" y="330" height="10" rx="5" fill="url(#bar)" width="0">
      <animate attributeName="width" from="0" to="452" begin="0.9s" dur="1.1s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
    </rect>
    <text x="952" y="340" text-anchor="end" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="14" font-weight="700" fill="#22D3EE">78%</text>
  </g>

  <!-- Français / English footnote row -->
  <g>
    <text x="48" y="398" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="12" fill="#475569">human_languages:</text>
    <text x="230" y="398" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="12" fill="#94A3B8">English (fluent) · Français (natif) · Español (conversational)</text>
  </g>
</svg>
